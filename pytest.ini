[pytest]
# pytest 配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --capture=no
    --browser=firefox
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
    api: API测试

