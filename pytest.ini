[pytest]
# pytest 配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --capture=no
    --browser=chromium
    --browser-channel=chrome
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
    api: API测试
    promotion_management: 推广管理模块
    backflow_features: 回流功能模块
    finance: 财务模块
    backflow_link: 回流链接
    product_library: 产品库
    domain: 域名
    backflow_landing_page: 回流落地页
    audience_backflow: 受众回流
    smart_shield: 智能绿盾
    complaint_backflow: 投诉回流
    pwa_backflow: PWA回流
    push_backflow: 推送回流
    returning_user_landing_page: 老客落地页
    wallet: 钱包
